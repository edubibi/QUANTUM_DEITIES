<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Creator Dashboard v5.0</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-anim"></div>

    <header>
        <div class="logo">QUANTUM<span>DEITIES</span></div>
        <div class="version">VORTEX 1.0 GENERATOR</div>
        <button id="exit-btn" class="btn-exit"
            onclick="window.location.href='../khem_web/index.html#coleccion-nft'">SALIR</button>
    </header>

    <main>
        <section class="controls">
            <h2>Panel de Configuración</h2>
            <div class="mode-selector">
                <button id="btn-faces" class="mode-btn active" onclick="setMode('FACES')">FACES (Humanoid)</button>
                <button id="btn-abstract" class="mode-btn" onclick="setMode('ABSTRACT')">ABSTRACT (Energy)</button>
            </div>

            <div class="action-zone" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button id="generate-btn" class="primary-btn">GENERAR x1</button>
                <button id="generate-batch-10-btn" class="primary-btn" onclick="generateBatch(10)">BATCH x10</button>
                <button id="generate-batch-50-btn" class="primary-btn" onclick="generateBatch(50)">BATCH x50</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <span class="label">RUIDO CUÁNTICO:</span>
                    <span class="value" id="noise-val">98.4%</span>
                </div>
                <div class="stat-item">
                    <span class="label">ESTABILIDAD:</span>
                    <span class="value" id="stability-val">SYNCED</span>
                </div>
            </div>
        </section>

        <section class="display">
            <div class="card glass">
                <div class="card-header">
                    <span id="rarity-badge" class="badge common">COMMON</span>
                    <span id="mode-label">SERIE: FACES</span>
                </div>

                <div class="visual-preview">
                    <div id="loading-spinner" class="hidden">NEURAL SYNC...</div>
                    <img id="nft-preview" src="samples/face_v5_1.png" alt="Preview">
                </div>

                <div class="prompt-container">
                    <textarea id="prompt-text" style="width: 100%; min-height: 120px; background: rgba(0,0,0,0.5); color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; font-family: 'Rajdhani', sans-serif; resize: vertical;" readonly>Haz clic en el botón para generar prompts.</textarea>
                </div>

                <div class="card-footer">
                    <div class="footer-btns">
                        <button class="secondary-btn" onclick="copyPrompt()">COPIAR PROMPT</button>
                        <button id="download-btn" class="secondary-btn download-btn" onclick="downloadNFT()">DESCARGAR
                            FOTO</button>
                    </div>
                    <div class="metadata">
                        <span id="id-tag">ID: #0000</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
