<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM DEITIES - ATOMIC PROMPT VIEWER v4.0</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-magenta: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-gold: #ffcc00;
            --bg-dark: #050505;
            --card-glass: rgba(20, 20, 20, 0.9);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 40px;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(255, 0, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 255, 255, 0.08) 0%, transparent 40%);
            min-height: 100vh;
        }

        .header-container {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-gold);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .subtitle {
            font-family: 'Rajdhani', sans-serif;
            color: var(--neon-cyan);
            letter-spacing: 4px;
            font-size: 1.2rem;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
        }

        .prompt-card {
            background: var(--card-glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 4px;
            /* Sharper industrial look */
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .prompt-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--neon-cyan);
            opacity: 0.3;
        }

        .prompt-card:hover {
            border-color: var(--neon-magenta);
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .prompt-card:hover::before {
            background: var(--neon-magenta);
            opacity: 1;
            box-shadow: 0 0 10px var(--neon-magenta);
        }

        .prompt-id {
            color: var(--neon-magenta);
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        .prompt-text {
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 25px;
            color: #ececec;
            font-weight: 300;
        }

        .copy-btn {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 20px;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            transition: all 0.2s;
            width: 100%;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .copy-btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .copy-btn.copied {
            border-color: var(--neon-magenta);
            color: #fff;
            background: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.6rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 10px;
            color: #888;
            text-transform: uppercase;
        }

        /* Scanline effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            opacity: 0.4;
        }
    </style>
</head>

<body>

    <div class="header-container">
        <h1>QUANTUM DEITIES</h1>
        <div class="subtitle">ATOMIC PROMPT SYSTEM v4.0</div>
    </div>

    <div class="container" id="promptContainer">
        <!-- Prompts will be loaded here -->
    </div>

    <script>
        const prompts = [
            {
                "id": 1,
                "prompt": "Portrait of a Post-human Messiah with a matte white carbon fiber, intricate fiber-optic capillaries, holographic iris projecting status codes, surrounded by ethereal wisps of plasma energy and suspended micro-probes following the head. Lighting: volumetric fog illuminated by neon flares, palette of blood orange and cold steel gray. Technical style: symmetrical composition, intricate details, hyper-realistic, high fidelity."
            },
            {
                "id": 2,
                "prompt": "Portrait of a Celestial Android with a matte white carbon fiber, embedded crystalline processors along the jawline, multi-faceted diamond ocular lenses, surrounded by vortex of swirling quantum energy particles and rotating rings of pure ultraviolet light. Lighting: subtle glitch-art distortions in the air, palette of cyberpunk cyan and electric magenta. Technical style: low angle heroic shot, intricate details, hyper-realistic, high fidelity."
            },
            {
                "id": 3,
                "prompt": "Portrait of a Android Archangel with a sculpted porcelain face, intricate fiber-optic capillaries, glowing sapphire optic sensors, surrounded by aurora-like data streams and rotating rings of pure ultraviolet light. Lighting: dense digital haze with light-streaks, palette of cyberpunk cyan and electric magenta. Technical style: highly detailed textured render, intricate details, hyper-realistic, high fidelity."
            },
            {
                "id": 4,
                "prompt": "Portrait of a Quantum Muse with a iridescent synth-flesh, liquid light conduits flowing like tears, void-black sensory implants with rotating rings, surrounded by pulsing ion-fields creating a corona effect and rotating rings of pure ultraviolet light. Lighting: dramatically backlit by a dying star, palette of blood orange and cold steel gray. Technical style: telephoto lens portrait with shallow depth of field, intricate details, hyper-realistic, high fidelity."
            },
            {
                "id": 5,
                "prompt": "Portrait of a Neural Empress with a perfectly symmetrical synthetic skin, intricate fiber-optic capillaries, holographic iris projecting status codes, surrounded by vortex of swirling quantum energy particles and hovering neural-link connectors. Lighting: chromatic aberration at the edges of reality, palette of toxic green and deep ultraviolet. Technical style: low angle heroic shot, intricate details, hyper-realistic, high fidelity."
            },
            {
                "id": 6,
                "prompt": "Portrait of a Synthetic Goddess with a shifted liquid mercury visage, glowing neon neural pathways, multi-faceted diamond ocular lenses, surrounded by cascades of binary code rain in the atmosphere and orbiting shards of obsidian and gold. Lighting: bokeh of data-shards and hexagons, palette of iridiscent opal and midnight blue. Technical style: supreme detail concept art, hyper-realistic, high fidelity."
            },
            {
                "id": 7,
                "prompt": "Portrait of a Silicon Deity with shifting liquid mercury visage, liquid light conduits flowing like tears, mechanical pupils contracting with clockwork precision, surrounded by auroras of data streams and levitating tech-crown made of floating antennas. Lighting: dramatically backlit by a cosmic void, palette of regal gold and matte black. Technical style: masterpiece by Moebius, intricate mechanical ports."
            },
            {
                "id": 8,
                "prompt": "Portrait of a Glitch Titan with veined marble cyber-face, micro-laser etched fractal patterns, burning amber laser-array eyes, surrounded by molecular dust suspended in a temporal field and hovering neural-link connectors. Lighting: chromatic aberration intense, palette of crimson pulse and metallic chrome. Technical style: extreme close-up macro, 8k resolution UE5."
            }
        ];

        const container = document.getElementById('promptContainer');

        prompts.forEach(p => {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.innerHTML = `
                <div class="badge">ATOMIC_v4</div>
                <div class="prompt-id">TRANSMISSION_#0${p.id}</div>
                <div class="prompt-text">${p.prompt}</div>
                <button class="copy-btn" onclick="copyToClipboard('${p.prompt}', this)">COPY QUANTUM DATA</button>
            `;
            container.appendChild(card);
        });

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerText;
                btn.innerText = 'DATA_COPIED';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>

</html>
